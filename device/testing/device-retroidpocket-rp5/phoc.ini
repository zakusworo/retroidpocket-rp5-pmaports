# /etc/phosh/phoc.ini  (overrides /usr/share/phosh/phoc.ini)
# Retroid Pocket 5: rotation is handled by the wlr-randr autostart
# (/usr/bin/rp5-orientation); phoc.ini's "rotate" is overridden by the DRM
# panel-orientation, but "scale" applies, so set the 1.75 scale here too.
[output:DSI-1]
scale = 1.75
